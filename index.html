<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stir Landing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__container">
        <a href="./" class="logo">
          <img src="./images/logo/stir.svg" alt="Stir">
        </a>
        <a href="#" class="header__link">
          Join our team
        </a>
      </div>
    </header>
  
    <main>
      <section class="hero">
        <div class="container hero__container">
          <h1 class="hero__title">
            Where creators run their business.
          </h1>
  
          <p class="hero__text">
            Meet Stir. The financial studio for collaborating, splitting revenue, 
            money management and metrics—all in one place
          </p>
  
          <form action="#" class="hero__form">
            <label class="visually-hidden" for="email">
              Email
            </label>
  
            <input
              class="hero__input"
              id="email"
              type="email"
              name="email"
              placeholder="Enter your email"
            >
  
            <button class="hero__button" type="submit">
              Get started
            </button>
          </form>
        </div>
      </section>
  
    </main>
  
    <footer class="footer"></footer>
  
    <script src="./js/main.js" defer></script>
  </body>
</html>
