<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stir Landing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__container">
        <a href="./" class="logo">
          <img src="./images/logo/stir.svg" alt="Stir">
        </a>
        <a href="#" class="header__link">
          Join our team
        </a>
      </div>
    </header>
  
    <main>
      <section class="hero">
        <div class="container hero__container">
          <h1 class="hero__title">
            Where creators run their business.
          </h1>
  
          <p class="hero__text">
            Meet Stir. The financial studio for collaborating, splitting revenue, 
            money management and metrics—all in one place
          </p>
  
          <form action="#" class="hero__form">
            <label class="visually-hidden" for="email">
              Email
            </label>
  
            <input
              class="hero__input"
              id="email"
              type="email"
              name="email"
              placeholder="Enter your email"
            >
  
            <button class="hero__button" type="submit">
              Get started
            </button>
          </form>
        </div>

        <div class="hero__creators">
          <article class="creator-card">
            <img
              class="creator-card__photo"
              src="./images/hero/creators/creator-1.jpg"
              alt="Anna, Podcaster"
            >
        
            <div class="creator-card__info">
              <h3 class="creator-card__name">Anna</h3>
              <p class="creator-card__role">Podcaster</p>
            </div>
        
            <div class="creator-card__socials">
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/youtube.svg" alt="YouTube">
              </a>
        
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/instagram.svg" alt="Instagram">
              </a>
            </div>
          </article>
        
          <article class="creator-card">
            <img
              class="creator-card__photo"
              src="./images/hero/creators/creator-2.jpg"
              alt="Airrack, YouTuber"
            >
        
            <div class="creator-card__info">
              <h3 class="creator-card__name">Airrack</h3>
              <p class="creator-card__role">YouTuber</p>
            </div>
        
            <div class="creator-card__socials">
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/youtube.svg" alt="YouTube">
              </a>
            </div>
          </article>
        
          <article class="creator-card">
            <img
              class="creator-card__photo"
              src="./images/hero/creators/creator-3.jpg"
              alt="Liza Koshy, Creator"
            >
        
            <div class="creator-card__info">
              <h3 class="creator-card__name">Liza Koshy</h3>
              <p class="creator-card__role">Creator</p>
            </div>
        
            <div class="creator-card__socials">
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/instagram.svg" alt="Instagram">
              </a>
        
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/youtube.svg" alt="YouTube">
              </a>
        
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/twitter.svg" alt="Twitter">
              </a>
            </div>
          </article>
        
          <article class="creator-card">
            <img
              class="creator-card__photo"
              src="./images/hero/creators/creator-4.jpg"
              alt="Peter Hollens, Musician"
            >
        
            <div class="creator-card__info">
              <h3 class="creator-card__name">Peter Hollens</h3>
              <p class="creator-card__role">Musician</p>
            </div>
        
            <div class="creator-card__socials">
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/youtube.svg" alt="YouTube">
              </a>
        
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/shopify.svg" alt="Shopify">
              </a>
            </div>
          </article>
        
          <article class="creator-card">
            <img
              class="creator-card__photo"
              src="./images/hero/creators/creator-5.jpg"
              alt="Jessica, Streamer"
            >
        
            <div class="creator-card__info">
              <h3 class="creator-card__name">Jessica</h3>
              <p class="creator-card__role">Streamer</p>
            </div>
        
            <div class="creator-card__socials">
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/youtube.svg" alt="YouTube">
              </a>
        
              <a href="#" class="creator-card__social">
                <img src="./images/hero/socials/instagram.svg" alt="Instagram">
              </a>
            </div>
          </article>
        </div>

        <div class="hero__dashboard">
          <img
            class="hero__dashboard-image"
            src="./images/hero/dashboard/dashboard-preview.png"
            alt="Stir dashboard preview"
          >
        </div>
        
      </section>
  
    </main>
  
    <footer class="footer"></footer>
  
    <script src="./js/main.js" defer></script>
  </body>
</html>
